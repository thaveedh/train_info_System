version: "3.9"

services:
  db:
    image: postgres:14
    container_name: train_db
    restart: always
    environment:
      POSTGRES_USER: train_user
      POSTGRES_PASSWORD: train_pass
      POSTGRES_DB: train_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: train_backend
    restart: always
    depends_on:
      - db
    ports:
      - "8000:8000"     # ⬅ backend now reachable from browser & chatbot
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: train_user
      DB_PASSWORD: train_pass
      DB_NAME: train_db
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
